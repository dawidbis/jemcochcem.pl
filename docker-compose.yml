version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: SecretPassword123!
      POSTGRES_DB: fitappdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      # Nazwa 'DefaultConnection' musi pasować do tej w appsettings.json
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=fitappdb;Username=postgres;Password=SecretPassword123!
    depends_on:
      - db

volumes:
  postgres_data: